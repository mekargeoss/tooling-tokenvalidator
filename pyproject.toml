[tool.ruff]
line-length = 80
target-version = "py311"

# Enable useful rule groups
lint.select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]

lint.ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
warn_return_any = true
warn_unused_ignores = true
strict_optional = true
disallow_untyped_defs = false
ignore_missing_imports = true

